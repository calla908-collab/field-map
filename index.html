<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>현장 위치 지도</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
#map{position:fixed;inset:0;overflow:hidden;cursor:grab;background:#e8e0d8}
#map.gr{cursor:grabbing}
#tl,#mk{position:absolute;top:0;left:0}
#mk{pointer-events:none}
.tile{position:absolute;width:256px;height:256px}
/* 마커 */
.m{position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;display:flex;align-items:center;gap:3px}
.dot{width:13px;height:13px;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.5);flex-shrink:0;transition:background .3s}
.dot-todo{background:#e63946}
.dot-done{background:#2dc653}
.mlb{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;line-height:1.4;transition:background .3s,color .3s}
.mlb-todo{background:rgba(0,0,0,.65);color:#fff}
.mlb-done{background:rgba(45,198,83,.85);color:#fff}
.done-icon{font-size:11px;position:absolute;left:50%;transform:translateX(-50%) translateY(-60%);top:0;pointer-events:none}
.cl{width:38px;height:38px;background:rgba(255,235,0,.95);border:2px solid rgba(0,0,0,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a0a00;box-shadow:0 2px 8px rgba(0,0,0,.3)}
/* 팝업 */
#pop{position:fixed;z-index:500;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 6px 24px rgba(0,0,0,.25);width:250px;display:none}
.pname{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;padding-right:22px}
.pcoord{color:#bbb;font-size:10px;margin-bottom:4px}
.paddr{color:#444;font-size:12px;margin-bottom:10px;line-height:1.6;min-height:18px}
.paddr.ld{color:#bbb;font-style:italic}
.pbtns{display:flex;flex-direction:column;gap:6px}
.pbtn{display:block;padding:10px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;border:none;width:100%}
.pbtn-k{background:#FFEB00;color:#1a0a00}
.pbtn-done{background:#2dc653;color:#fff}
.pbtn-undo{background:#f0f0f0;color:#666;font-size:12px;padding:7px}
.pclose{position:absolute;top:8px;right:10px;border:none;background:none;font-size:22px;color:#ccc;cursor:pointer;line-height:1}
.pstatus{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.pstatus-todo{background:#fff0f0;color:#e63946}
.pstatus-done{background:#f0fff4;color:#2dc653}
/* 상단바 */
#tb{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,235,0,.97);display:flex;align-items:center;gap:8px;padding:10px 12px}
#tb h1{font-size:14px;font-weight:700;color:#1a0a00;white-space:nowrap}
#si{flex:1;min-width:0;background:rgba(0,0,0,.12);border:none;border-radius:20px;padding:7px 14px;font-size:14px;color:#1a0a00;outline:none}
#si::placeholder{color:rgba(0,0,0,.4)}
.tbtn{background:rgba(0,0,0,.12);border:none;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:600;color:#1a0a00;cursor:pointer;white-space:nowrap}
/* 상태 배지 */
#bd{position:fixed;top:58px;left:12px;z-index:100;background:rgba(0,0,0,.7);border-radius:20px;padding:4px 14px;font-size:12px;color:#fff;display:flex;gap:10px}
#bd .bdone{color:#2dc653;font-weight:600}
/* 줌 */
#zm{position:fixed;right:12px;top:76px;z-index:100;display:flex;flex-direction:column;gap:6px}
#zm button{width:40px;height:40px;background:#fff;border:none;border-radius:10px;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
/* 사이드 패널 */
#sh{position:fixed;top:0;right:0;bottom:0;z-index:200;width:280px;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
#sh.on{transform:translateX(0)}
#shhead{padding:12px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#f9f9f9}
#shhead strong{font-size:14px;color:#111}
#shcount{font-size:11px;color:#888;margin-top:2px}
#shclose{background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;padding:0 0 0 8px}
/* 필터 탭 */
#filter{display:flex;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.ftab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.ftab.on{color:#1a0a00;border-bottom-color:#FFEB00}
#srch2{width:100%;padding:8px 12px;border:none;border-bottom:1px solid #f0f0f0;font-size:13px;outline:none;flex-shrink:0}
#srch2::placeholder{color:#bbb}
#shl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.li{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:.5px solid #f2f2f2;cursor:pointer}
.li:hover,.li:active{background:#f8f8f8}
.lnum{min-width:60px;font-size:11px;font-weight:700;border-radius:6px;padding:3px 6px;text-align:center;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lnum-todo{background:#FFEB00;color:#1a0a00}
.lnum-done{background:#2dc653;color:#fff}
.lcoord{font-size:10px;color:#aaa;margin-top:1px}
.ldone-mark{font-size:10px;color:#2dc653;margin-left:auto;flex-shrink:0}
</style>
</head><body>
<div id="map"><div id="tl"></div><div id="mk"></div></div>

<div id="pop" onclick="event.stopPropagation()">
  <button class="pclose" onclick="event.stopPropagation();cPop()">×</button>
  <div class="pname" id="pn"></div>
  <div class="pstatus" id="pst"></div>
  <div class="pcoord" id="pc"></div>
  <div class="paddr ld" id="pa">주소 조회 중...</div>
  <div class="pbtns">
    <a class="pbtn pbtn-k" id="pk" target="_blank">📍 카카오맵에서 보기</a>
    <button class="pbtn pbtn-done" id="pdone" onclick="toggleDone()">✅ 완료 처리</button>
    <button class="pbtn pbtn-undo" id="pundo" onclick="toggleDone()" style="display:none">↩ 완료 취소</button>
  </div>
</div>

<div id="tb">
  <h1>📍 현장지도</h1>
  <input id="si" type="search" placeholder="포인트 검색..." oninput="srch(this.value)">
  <button class="tbtn" onclick="togSh()">☰ 목록</button>
</div>
<div id="workerBadge" style="display:none;position:fixed;top:58px;right:12px;z-index:100;background:#3a3a3c;color:#FFEB00;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600"></div>
<div id="bd">
  <span id="cnt">-</span>
  <span>|</span>
  <span class="bdone">✅ <span id="dcnt">0</span> 완료</span>
</div>
<div id="zm"><button onclick="dz(1)">+</button><button onclick="dz(-1)">−</button></div>

<div id="sh">
  <div id="shhead">
    <div>
      <strong>포인트 목록</strong>
      <div id="shcount"></div>
    </div>
    <button id="shclose" onclick="closeSh()">×</button>
  </div>
  <div id="filter">
    <div class="ftab on" id="ft-all" onclick="setFilter('all')">전체</div>
    <div class="ftab" id="ft-todo" onclick="setFilter('todo')">미완료</div>
    <div class="ftab" id="ft-done" onclick="setFilter('done')">완료 ✅</div>
  </div>
  <input id="srch2" type="search" placeholder="검색..." oninput="srch(this.value)">
  <div id="shl"></div>
</div>

      var clText=allDone?'✓'+g.pts.length:g.pts.length+(doneCount>0?'<br><small style="font-size:8px">✓'+doneCount+'</small>':'');
      div.innerHTML='<div class="cl" style="'+clStyle+'">'+clText+'</div>';
      (function(la,ln){div.onclick=function(){
        var nz=Math.min(Z+2,18),f=Math.pow(2,nz-Z);
        var c=ll2t(la,ln,nz);CX=c.x;CY=c.y;Z=nz;
        TC={};document.getElementById('tl').innerHTML='';draw();
      };})(g.la,g.ln);
    }
    md.appendChild(div);
  });
  document.getElementById('cnt').textContent=D.length+'개';
  document.getElementById('dcnt').textContent=doneSet.size;
}

function draw(){drawTiles();drawMarkers();}

// 주소 조회 (Nominatim)
function getAddr(la,ln,cb){
  var key=la.toFixed(5)+','+ln.toFixed(5);
  if(addrCache[key]){cb(addrCache[key]);return;}
  var url='https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+ln+'&format=json&accept-language=ko&zoom=18&addressdetails=1';
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      var addr='주소 없음';
      if(d&&d.address){
        var a=d.address;
        var parts=[];
        // 시/도
        if(a.province)parts.push(a.province);
        else if(a.state)parts.push(a.state);
        // 시/군/구
        if(a.city)parts.push(a.city);
        else if(a.county)parts.push(a.county);
        else if(a.town)parts.push(a.town);
        // 읍/면/동
        if(a.suburb)parts.push(a.suburb);
        else if(a.quarter)parts.push(a.quarter);
        else if(a.neighbourhood)parts.push(a.neighbourhood);
        else if(a.village)parts.push(a.village);
        // 도로명
        if(a.road)parts.push(a.road);
        // 번지
        if(a.house_number)parts.push(a.house_number);
        if(parts.length>0)addr=parts.join(' ');
        else if(d.display_name)addr=d.display_name.split(',').slice(0,4).join(',');
      }
      addrCache[key]=addr;
      cb(addr);
    })
    .catch(function(){cb('주소 조회 실패');});
}

function sPop(d,x,y){
  curPop=d;
  var nm=d[0],la=d[1],ln=d[2];
  var done=isDone(nm);

  document.getElementById('pn').textContent=nm;
  document.getElementById('pc').textContent=la.toFixed(6)+' / '+ln.toFixed(6);
  document.getElementById('pa').textContent='주소 조회 중...';
  document.getElementById('pa').className='paddr ld';

  var pst=document.getElementById('pst');
  pst.textContent=done?'✅ 완료':'📌 미완료';
  pst.className='pstatus '+(done?'pstatus-done':'pstatus-todo');

  document.getElementById('pdone').style.display=done?'none':'block';
  document.getElementById('pundo').style.display=done?'block':'none';

  var mapUrl='https://map.kakao.com/link/map/'+nm+','+la+','+ln;
  document.getElementById('pk').href=mapUrl;

  getAddr(la,ln,function(addr){
    var pa=document.getElementById('pa');
    if(pa){pa.textContent=addr;pa.className='paddr';}
  });

  var pop=document.getElementById('pop');
  var left=Math.min(x+14,W-265);
  var top=Math.max(Math.min(y-120,H-240),58);
  pop.style.left=left+'px';pop.style.top=top+'px';pop.style.display='block';
}

function toggleDone(){
  if(!curPop)return;
  event && event.stopPropagation();
  var nm=curPop[0];
  if(isDone(nm)){doneSet.delete(nm);}else{doneSet.add(nm);}
  saveDone();
  // 팝업 상태만 업데이트 (위치 유지)
  var done=isDone(nm);
  var pst=document.getElementById('pst');
  pst.textContent=done?'✅ 완료':'📌 미완료';
  pst.className='pstatus '+(done?'pstatus-done':'pstatus-todo');
  document.getElementById('pdone').style.display=done?'none':'block';
  document.getElementById('pundo').style.display=done?'block':'none';
  drawMarkers();
  buildList(getFilteredList());
}

function cPop(){document.getElementById('pop').style.display='none';curPop=null;}

// 드래그/터치
var dr={on:0,sx:0,sy:0,cx:0,cy:0};
var mapEl=document.getElementById('map');
mapEl.onmousedown=function(e){dr={on:1,sx:e.clientX,sy:e.clientY,cx:CX,cy:CY};mapEl.classList.add('gr');};
document.onmousemove=function(e){if(dr.on){CX=dr.cx-(e.clientX-dr.sx)/256;CY=dr.cy-(e.clientY-dr.sy)/256;draw();}};
document.onmouseup=function(){dr.on=0;mapEl.classList.remove('gr');};
var tp={on:0,sx:0,sy:0,cx:0,cy:0,pd:0};
mapEl.addEventListener('touchstart',function(e){
  if(e.touches.length===1)tp={on:1,sx:e.touches[0].clientX,sy:e.touches[0].clientY,cx:CX,cy:CY,pd:0};
  else{tp.on=0;tp.pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
mapEl.addEventListener('touchmove',function(e){
  if(tp.on&&e.touches.length===1){CX=tp.cx-(e.touches[0].clientX-tp.sx)/256;CY=tp.cy-(e.touches[0].clientY-tp.sy)/256;draw();}
  else if(e.touches.length===2&&tp.pd){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(Math.abs(d-tp.pd)>25){dz(d>tp.pd?1:-1);tp.pd=d;}}
},{passive:true});
mapEl.addEventListener('touchend',function(){tp.on=0;},{passive:true});
mapEl.addEventListener('wheel',function(e){e.preventDefault();dz(e.deltaY<0?1:-1);},{passive:false});
mapEl.onclick=function(){cPop();};

function dz(d){
  var nz=Math.max(5,Math.min(18,Z+d));if(nz===Z)return;
  var f=Math.pow(2,nz-Z);CX*=f;CY*=f;Z=nz;
  TC={};document.getElementById('tl').innerHTML='';draw();
}

// 검색 및 필터
function srch(q){
  q=q.trim().toUpperCase();
  document.getElementById('si').value=q;
  document.getElementById('srch2').value=q;
  buildList(getFilteredList(q));
  if(!shOn)openSh();
}

function setFilter(f){
  curFilter=f;
  ['all','todo','done'].forEach(function(t){
    document.getElementById('ft-'+t).className='ftab'+(t===f?' on':'');
  });
  buildList(getFilteredList());
}

function getFilteredList(q){
  var base=D;
  if(curFilter==='todo')base=D.filter(function(d){return!isDone(d[0]);});
  else if(curFilter==='done')base=D.filter(function(d){return isDone(d[0]);});
  if(q){var qu=q.toUpperCase();base=base.filter(function(d){return d[0].toUpperCase().indexOf(qu)>=0;});}
  return base;
}

function buildList(d){
  var todo=D.filter(function(x){return!isDone(x[0]);}).length;
  var done=doneSet.size;
  document.getElementById('shcount').textContent='전체 '+D.length+' | 미완료 '+todo+' | 완료 '+done;
  var h='';
  for(var i=0;i<Math.min(d.length,500);i++){
    var nm=d[i][0],dn=isDone(nm);
    h+='<div class="li" onclick="flyTo('+d[i][1]+','+d[i][2]+',\''+nm.replace(/'/g,"\\'")+'\')"><div class="lnum '+(dn?'lnum-done':'lnum-todo')+'">'+nm+'</div><div style="flex:1"><div class="lcoord">'+d[i][1].toFixed(5)+'</div><div class="lcoord">'+d[i][2].toFixed(5)+'</div></div>'+(dn?'<div class="ldone-mark">✅</div>':'')+'</div>';
  }
  if(d.length>500)h+='<div style="padding:12px;text-align:center;font-size:11px;color:#ccc">검색으로 더 찾아보세요 (전체 '+d.length+'개)</div>';
  document.getElementById('shl').innerHTML=h;
}

function flyTo(la,ln,nm){
  cPop();
  if(Z<16){var nz=17,f=Math.pow(2,nz-Z);CX*=f;CY*=f;Z=nz;TC={};document.getElementById('tl').innerHTML='';}
  var c=ll2t(la,ln,Z);CX=c.x;CY=c.y;draw();
  if(nm){setTimeout(function(){
    var d=D.find(function(x){return x[0]===nm;});
    if(d){var t=ll2t(d[1],d[2],Z);sPop(d,(t.x-CX)*256+W/2,(t.y-CY)*256+H/2);}
  },300);}
}

function togSh(){shOn?closeSh():openSh();}
function openSh(){shOn=true;document.getElementById('sh').classList.add('on');}
function closeSh(){shOn=false;document.getElementById('sh').classList.remove('on');}
var sx2=0;
document.getElementById('sh').addEventListener('touchstart',function(e){sx2=e.touches[0].clientX;},{passive:true});
document.getElementById('sh').addEventListener('touchend',function(e){if(e.changedTouches[0].clientX-sx2>60)closeSh();},{passive:true});
window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;draw();});
draw();buildList(D);
</script></body></html>
