  document.getElementById('errmsg').textContent='카카오맵 로드 실패 — 도메인 등록을 확인하세요';
  document.querySelector('.sp').style.display='none';

kakao.maps.load(function(){
  map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(35.15,126.79),level:6});
  map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
  cl=new kakao.maps.MarkerClusterer({map:map,averageCenter:true,minLevel:5,
    styles:[{width:'46px',height:'46px',background:'rgba(255,235,0,.92)',borderRadius:'50%',

function build(d){
  cl.clear();mk=[];
  var b=new kakao.maps.LatLngBounds();
  for(var i=0;i<d.length;i++){(function(n,la,ln){
    var m=new kakao.maps.Marker({position:new kakao.maps.LatLng(la,ln),title:n});
    kakao.maps.event.addListener(m,'click',function(){showOv(m,n,la,ln);});
    mk.push(m);b.extend(new kakao.maps.LatLng(la,ln));
  })(d[i][0],d[i][1],d[i][2]);}
  cl.addMarkers(mk);
  if(d.length)map.setBounds(b);
  document.getElementById('st').textContent=d.length+'개 표시 중';
}
function showOv(m,n,la,ln){
  closeOv();
  ov=new kakao.maps.CustomOverlay({position:m.getPosition(),yAnchor:1.55,zIndex:10,
    content:"<div class='iw'><div class='in'>"+n+"</div><div class='ic'>"+la.toFixed(6)+", "+ln.toFixed(6)+"</div>"
    +"<div class='ir'><a class='ib ik' href='https://map.kakao.com/link/map/"+n+","+la+","+ln+"' target='_blank'>📍 카카오맵</a>"
    +"<a class='ib ig' href='kakaomap://route?ep="+la+","+ln+"&by=CAR'>🚗 길찾기</a></div></div>"});
  ov.setMap(map);map.panTo(m.getPosition());
}
function closeOv(){if(ov){ov.setMap(null);ov=null;}}
function onS(q){
  q=q.trim().toUpperCase();
  var d=q?D.filter(function(x){return x[0].toUpperCase().indexOf(q)>=0;}):D;
  build(d);rl(d);if(!on)openSh();
}
function rl(d){
  document.getElementById('lc').textContent=d.length+'개';
  var h='';
  for(var i=0;i<Math.min(d.length,300);i++){
    h+="<div class='li' onclick='fly("+d[i][1]+","+d[i][2]+")'>"
      +"<div class='ld'>"+d[i][0].slice(-3)+"</div>"
      +"<div><div class='ln'>"+d[i][0]+"</div>"
      +"<div class='lc'>"+d[i][1].toFixed(5)+", "+d[i][2].toFixed(5)+"</div></div></div>";
  }
  if(d.length>300)h+="<div style='padding:12px;text-align:center;font-size:11px;color:#ccc'>검색으로 더 찾아보세요 (전체 "+d.length+"개)</div>";
  document.getElementById('ls').innerHTML=h;
}
function fly(la,ln){
  closeSh();map.setLevel(3);map.panTo(new kakao.maps.LatLng(la,ln));
}
function togSh(){on?closeSh():openSh();}
function openSh(){on=true;document.getElementById('sh').classList.add('on');}
function closeSh(){on=false;document.getElementById('sh').classList.remove('on');}
var sy=0;
document.getElementById('sh').addEventListener('touchstart',function(e){sy=e.touches[0].clientY;},{passive:true});
document.getElementById('sh').addEventListener('touchend',function(e){if(e.changedTouches[0].clientY-sy>50)closeSh();},{passive:true});
