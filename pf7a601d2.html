<script>
var db=null,fbState={},PROJ_ID='pf7a601d2';
// 담당자 이름 초기값 (localStorage)
var WNAMES_KEY='fm_wnames_'+PROJ_ID;
var workerNames=JSON.parse(localStorage.getItem(WNAMES_KEY)||'{"1":"담당자1","2":"담당자2","3":"담당자3"}');

// 페이지 로드 즉시 Firebase REST API로 이름 불러오기 (SDK 불필요)
(function(){
  var url='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/workerNames.json';
  fetch(url).then(function(r){return r.json();}).then(function(raw){
    if(!raw)return;
    var names;
    if(Array.isArray(raw)){
      // Firebase가 숫자키를 배열로 변환한 경우
      names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
    }else if(typeof raw==='object'){
      names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
    }
    if(names){
      workerNames=names;
      localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
      updateWorkerNames();
    }
  }).catch(function(e){console.log('이름 로딩 실패:',e);});
})();


function fbLoad(){
  // Firebase SDK를 순서대로 로딩
  function loadScript(url,cb){
    var s=document.createElement('script');
    s.src=url;s.async=true;
    s.onload=cb;s.onerror=function(){console.warn('SDK 로드 실패:',url);cb();};
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js',function(){
    loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js',function(){
      if(typeof firebase==='undefined'){console.warn('Firebase 없음');return;}
      try{
        if(!firebase.apps.length)firebase.initializeApp({"apiKey": "AIzaSyDCZils_rrPT3A5c163FM4Ij8ZXQBvPuqE", "databaseURL": "https://landsurvey2027-default-rtdb.firebaseio.com", "projectId": "landsurvey2027"});
        db=firebase.database();

        console.log('Firebase 연결됨');
        document.getElementById('fbDot').textContent='🟢';
        document.getElementById('fbDot').title='Firebase 실시간 연결됨';
        // ★ 상태 실시간 리스너 (완료/담당자 변경 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/status').on('value',function(snap){
          fbState=snap.val()||{};
          // 삭제된 포인트 처리
          Object.keys(fbState).forEach(function(nm){
            if(fbState[nm]&&fbState[nm].deleted){
              var idx=DALL.findIndex(function(d){return d[0]===nm;});
              if(idx>=0)DALL.splice(idx,1);
            }
            localState[nm]=Object.assign(localState[nm]||{},fbState[nm]);
          });
          drawMarkers();updateStats();buildList(getFltList());
        });
        // 담당자명 실시간 감지 (PC에서 바꾸면 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/workerNames').on('value',function(snap){
          var raw=snap.val();
          if(!raw)return;
          var names;
          if(Array.isArray(raw)){
            names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
          }else{
            names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
          }
          workerNames=names;
          localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
          updateWorkerNames();
          buildList(getFltList());
        });
      }catch(e){console.warn('Firebase 오류:',e);}
    });
  });
}
</script>

  if(!cv)return;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!showLines||!DLINES||!DLINES.length)return;
  var layerColors={'ZD001':'#FF4400','새한항업':'#0088FF','TZD001':'#FF8800','0':'#3366FF'};
  DLINES.forEach(function(item){
    var color=layerColors[item.layer]||'#FF6600';
    if(item.tp==='text'||item.type==='text'){
      // 텍스트 표시
      if(!item.pts||!item.pts[0])return;
      var t=ll2t(item.pts[0][0],item.pts[0][1],Z);
      var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
      if(sx<-200||sx>W+200||sy<-200||sy>H+200)return;
      var fontSize=Math.max(10,Math.min(18,Z-4));
      ctx.font='bold '+fontSize+'px Arial';
      ctx.fillStyle=color;
      ctx.globalAlpha=0.9;
      ctx.strokeStyle='rgba(255,255,255,0.8)';
      ctx.lineWidth=3;
      ctx.strokeText(item.text||'',sx,sy);
      ctx.fillText(item.text||'',sx,sy);
    } else {
      // 라인 표시
      var pts=item.pts;
      if(!pts||pts.length<2)return;
      ctx.beginPath();
      ctx.strokeStyle=color;
      ctx.lineWidth=Z>=16?2.5:Z>=14?2:1.5;
      ctx.globalAlpha=0.9;
      var first=true;
      pts.forEach(function(pt){
        var t=ll2t(pt[0],pt[1],Z);
        var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
        if(first){ctx.moveTo(sx,sy);first=false;}
        else ctx.lineTo(sx,sy);
      });
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1.0;
}

function ll2t(la,ln,z){var n=Math.pow(2,z);return{x:(ln+180)/360*n,y:(1-Math.log(Math.tan(la*R)+1/Math.cos(la*R))/Math.PI)/2*n};}
function t2ll(tx,ty,z){var n=Math.pow(2,z),ln=tx/n*360-180;return{la:Math.atan(Math.sinh(Math.PI*(1-2*ty/n)))/R,ln:ln};}
// 초기 중심: 포인트 우선, 없으면 DXF 라인 중심

})();
function p2s(tx,ty){return{x:(tx-CX)*256+W/2,y:(ty-CY)*256+H/2};}

function drawTiles(){

  });

// 클러스터
function cluster(pts){
  var cell=44,g={};
  pts.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),x=(t.x-CX)*256+W/2,y=(t.y-CY)*256+H/2;
    if(x<-80||x>W+80||y<-80||y>H+80)return;
    if(selMode){g[d[0]]={p:[d],la:d[1],ln:d[2],x:x,y:y};return;}
    var k=Math.floor(x/cell)+','+Math.floor(y/cell);
    if(!g[k])g[k]={p:[],la:0,ln:0,x:0,y:0};
    g[k].p.push(d);g[k].la+=d[1];g[k].ln+=d[2];g[k].x+=x;g[k].y+=y;
  });
  return Object.keys(g).map(function(k){var c=g[k],n=c.p.length;return{pts:c.p,la:n>1?c.la/n:c.la,ln:n>1?c.ln/n:c.ln,x:n>1?c.x/n:c.x,y:n>1?c.y/n:c.y};});
}

// 박스 선택 (PC)
var boxStart=null,boxEnd=null;
function updateBoxRect(){
  if(!boxStart||!boxEnd)return;
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  var r=document.getElementById('boxRect');
  r.style.cssText='display:block;left:'+x1+'px;top:'+y1+'px;width:'+(x2-x1)+'px;height:'+(y2-y1)+'px';
}
function finishBox(){
  if(!boxStart||!boxEnd){boxStart=null;return;}
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  document.getElementById('boxRect').style.display='none';
  if(x2-x1<5&&y2-y1<5){boxStart=null;return;}
  // 박스 → 위경도 변환
  var tl1=s2t(x1,y1),tl2=s2t(x2,y2);
  var ll1=t2ll(tl1.x,tl1.y,Z),ll2=t2ll(tl2.x,tl2.y,Z);
  var mla=Math.min(ll1.la,ll2.la),xla=Math.max(ll1.la,ll2.la);
  var mln=Math.min(ll1.ln,ll2.ln),xln=Math.max(ll1.ln,ll2.ln);
  selSet=new Set();
  DALL.forEach(function(d){if(d[1]>=mla&&d[1]<=xla&&d[2]>=mln&&d[2]<=xln)selSet.add(d[0]);});
  boxStart=null;
  updateSelPanel();drawMarkers();
}

// 라쏘 선택 (모바일)
function drawLasso(){
  lassoCtx.clearRect(0,0,W,H);
  if(lassoPath.length<2)return;
  lassoCtx.beginPath();
  lassoCtx.moveTo(lassoPath[0].x,lassoPath[0].y);
  for(var i=1;i<lassoPath.length;i++)lassoCtx.lineTo(lassoPath[i].x,lassoPath[i].y);
  lassoCtx.closePath();
  lassoCtx.fillStyle='rgba(168,85,247,.12)';lassoCtx.fill();
  lassoCtx.strokeStyle='#a855f7';lassoCtx.lineWidth=2;lassoCtx.setLineDash([6,3]);lassoCtx.stroke();
}
function pointInPoly(px,py,poly){
  var inside=false;
  for(var i=0,j=poly.length-1;i<poly.length;j=i++){
    var xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }return inside;
}
function finishLasso(){
  if(lassoPath.length<3){lassoPath=[];lassoCtx.clearRect(0,0,W,H);return;}
  selSet=new Set();
  DALL.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),px=(t.x-CX)*256+W/2,py=(t.y-CY)*256+H/2;
    if(pointInPoly(px,py,lassoPath))selSet.add(d[0]);
  });
  lassoPath=[];lassoCtx.clearRect(0,0,W,H);
  updateSelPanel();drawMarkers();
}

var dr={on:0,sx:0,sy:0,cx:0,cy:0},tp={on:0,sx:0,sy:0,cx:0,cy:0,pd:0};
var isDrawing=false;
var mapEl=document.getElementById('map');
function getXY(e){var t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

// PC 이벤트 (박스 선택)
mapEl.addEventListener('mousedown',function(e){
  if(e.button!==0)return; // 왼쪽 클릭만
  if(selMode){
    e.preventDefault();
    boxStart={x:e.clientX,y:e.clientY};
    boxEnd={x:e.clientX,y:e.clientY};
    isDrawing=true;
  }else{
    dr={on:1,sx:e.clientX,sy:e.clientY,cx:CX,cy:CY};
    mapEl.classList.add('gr');
  }
});
document.addEventListener('mousemove',function(e){
  if(selMode&&isDrawing){
    boxEnd={x:e.clientX,y:e.clientY};
    updateBoxRect();
  }else if(!selMode&&dr.on){
    CX=dr.cx-(e.clientX-dr.sx)/256;
    CY=dr.cy-(e.clientY-dr.sy)/256;
    draw();
  }
});
document.addEventListener('mouseup',function(e){
  if(selMode&&isDrawing){
    isDrawing=false;
    finishBox();
  }
  dr.on=0;
  mapEl.classList.remove('gr');
});

// 모바일 이벤트 (라쏘 선택)
mapEl.addEventListener('touchstart',function(e){
  if(e.touches.length===2){tp.on=0;tp.pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  else if(selMode){isDrawing=true;lassoPath=[getXY(e)];lassoCanvas.style.display='block';}
  else{tp={on:1,sx:e.touches[0].clientX,sy:e.touches[0].clientY,cx:CX,cy:CY,pd:0};}
},{passive:true});
mapEl.addEventListener('touchmove',function(e){
  if(e.touches.length===2&&tp.pd){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(Math.abs(d-tp.pd)>25){dz(d>tp.pd?1:-1);tp.pd=d;}}
  else if(selMode&&isDrawing&&e.touches.length===1){lassoPath.push(getXY(e));drawLasso();}
  else if(tp.on&&e.touches.length===1){CX=tp.cx-(e.touches[0].clientX-tp.sx)/256;CY=tp.cy-(e.touches[0].clientY-tp.sy)/256;draw();}
},{passive:true});
mapEl.addEventListener('touchend',function(){
  if(selMode&&isDrawing){isDrawing=false;lassoCanvas.style.display='none';finishLasso();}
  tp.on=0;
},{passive:true});
mapEl.addEventListener('wheel',function(e){e.preventDefault();dz(e.deltaY<0?1:-1);},{passive:false});
mapEl.onclick=function(e){
  if(selMode)return; // 선택모드에서는 팝업 닫기 안 함
  cPop();
};

function dz(d){var nz=Math.max(5,Math.min(18,Z+d));if(nz===Z)return;var f=Math.pow(2,nz-Z);CX*=f;CY*=f;Z=nz;TC={};document.getElementById('tl').innerHTML='';draw();}

// 주소
function getAddr(la,ln,cb){
  var k=la.toFixed(5)+','+ln.toFixed(5);if(addrCache[k]){cb(addrCache[k]);return;}
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+ln+'&format=json&accept-language=ko&zoom=18')
    .then(function(r){return r.json();}).then(function(d){
      var addr='주소 없음';
      if(d&&d.address){var a=d.address,p=[];
        if(a.province||a.state)p.push(a.province||a.state);
        if(a.city||a.county||a.town)p.push(a.city||a.county||a.town);
        if(a.suburb||a.quarter||a.neighbourhood||a.village)p.push(a.suburb||a.quarter||a.neighbourhood||a.village);
        if(a.road)p.push(a.road);if(a.house_number)p.push(a.house_number);
        addr=p.length?p.join(' '):(d.display_name||'주소 없음');}
      addrCache[k]=addr;cb(addr);
    }).catch(function(){cb('주소 조회 실패');});
}

// 팝업
function sPop(d,x,y){
  if(selMode)return;curPop=d;
  var nm=d[0],la=d[1],ln=d[2],dn=isDone(nm),w=getWorker(nm);
  document.getElementById('pn').textContent=nm;
  document.getElementById('pc').textContent='위도: '+la.toFixed(6)+'  경도: '+ln.toFixed(6);
  // X(N), Y(E) 표시 (있는 경우)
  var pxyEl=document.getElementById('pxy');
  if(pxyEl){
    var xn=d[3],ye=d[4];
    pxyEl.textContent=(xn!=null&&ye!=null)?'X(N): '+xn.toFixed(3)+'   Y(E): '+ye.toFixed(3):'';
    pxyEl.style.display=(xn!=null&&ye!=null)?'block':'none';
  }
  document.getElementById('pa').textContent='주소 조회 중...';document.getElementById('pa').className='paddr ld';
  var pst=document.getElementById('pst');
  if(dn){pst.textContent='✅ 완료';pst.className='pst pst-d';}
  else if(w===1){pst.textContent='🔵 '+workerNames['1'];pst.className='pst pst-w1';}
  else if(w===2){pst.textContent='🟠 '+workerNames['2'];pst.className='pst pst-w2';}
  else if(w===3){pst.textContent='🟣 '+workerNames['3'];pst.className='pst pst-w3';}
  else{pst.textContent='📌 미할당';pst.className='pst pst-t';}
  document.getElementById('pdn').style.display=dn?'none':'block';
  document.getElementById('pud').style.display=dn?'block':'none';
  document.getElementById('pk').href='https://map.kakao.com/link/map/'+nm+','+la+','+ln;
  // 담당자 버튼 이름 업데이트
  document.getElementById('pw1').textContent=workerNames['1'];
  document.getElementById('pw2').textContent=workerNames['2'];
  document.getElementById('pw3').textContent=workerNames['3'];
  getAddr(la,ln,function(addr){var pa=document.getElementById('pa');if(pa){pa.textContent=addr;pa.className='paddr';}});
  var pop=document.getElementById('pop');
  pop.style.left=Math.min(x+14,W-265)+'px';pop.style.top=Math.max(Math.min(y-130,H-270),58)+'px';pop.style.display='block';
}
function cPop(){document.getElementById('pop').style.display='none';curPop=null;}
function deletePoint(){
  if(!curPop)return;
  var nm=curPop[0];
  if(!confirm('['+nm+'] 포인트를 삭제할까요?\n삭제 후 복구가 어렵습니다.'))return;
  // DALL에서 제거
  var idx=DALL.findIndex(function(d){return d[0]===nm;});
  if(idx>=0)DALL.splice(idx,1);
  // Firebase에 삭제 표시
  setFbStatus(nm,{deleted:true});
  // VP에서도 제거
  VP=VP.filter(function(d){return d[0]!==nm;});
  cPop();
  draw();buildList(getFltList());
  // 목록 패널 열기
  openSh();
}

function changeWorker(w){
  if(!curPop)return;
  var nm=curPop[0];
  setFbStatus(nm,{worker:w});
  var pst=document.getElementById('pst');
  if(w===0){pst.textContent='📌 미할당';pst.className='pst pst-t';}
  else if(w===1){pst.textContent='🔵 '+workerNames['1'];pst.className='pst pst-w1';}
  else if(w===2){pst.textContent='🟠 '+workerNames['2'];pst.className='pst pst-w2';}
  else if(w===3){pst.textContent='🟣 '+workerNames['3'];pst.className='pst pst-w3';}
  drawMarkers();updateStats();buildList(getFltList());
}

function toggleDone(){
  if(!curPop)return;var nm=curPop[0],done=!isDone(nm);
  setFbStatus(nm,{done:done,doneAt:done?Date.now():null});
  var pst=document.getElementById('pst'),w=getWorker(nm);
  if(done){pst.textContent='✅ 완료';pst.className='pst pst-d';}
  else if(w===1){pst.textContent='🔵 '+workerNames['1'];pst.className='pst pst-w1';}
  else if(w===2){pst.textContent='🟠 '+workerNames['2'];pst.className='pst pst-w2';}
  else if(w===3){pst.textContent='🟣 '+workerNames['3'];pst.className='pst pst-w3';}
  else{pst.textContent='📌 미할당';pst.className='pst pst-t';}
  document.getElementById('pdn').style.display=done?'none':'block';
  document.getElementById('pud').style.display=done?'block':'none';
  drawMarkers();updateStats();buildList(getFltList());
}

// 목록
function srch(q){q=q.trim().toUpperCase();document.getElementById('si').value=q;document.getElementById('s2').value=q;buildList(getFltList(q));if(!shOn)openSh();}
function setFlt(f){curFlt=f;['all','todo','w1','w2','w3','done'].forEach(function(t){document.getElementById('ft-'+t).className='ft'+(t===f?' on':'');});buildList(getFltList());}
function isDeleted(nm){return !!(getState(nm).deleted);}
function getFltList(q){
  // 삭제된 포인트 제외
  var active=DALL.filter(function(d){return!isDeleted(d[0]);});
  var base=active;
  if(curFlt==='todo')base=active.filter(function(d){return!isDone(d[0])&&!getWorker(d[0]);});
  else if(curFlt==='w1')base=active.filter(function(d){return getWorker(d[0])===1&&!isDone(d[0]);});
  else if(curFlt==='w2')base=active.filter(function(d){return getWorker(d[0])===2&&!isDone(d[0]);});
  else if(curFlt==='w3')base=active.filter(function(d){return getWorker(d[0])===3&&!isDone(d[0]);});
  else if(curFlt==='done')base=active.filter(function(d){return isDone(d[0]);});
  if(q){var qu=q.toUpperCase();base=base.filter(function(d){return d[0].toUpperCase().indexOf(qu)>=0;});}
  return base;
}
function buildList(d){
  var w1=0,w2=0,w3=0,dn=0,td=0;
  DALL.forEach(function(x){if(isDone(x[0]))dn++;else{var w=getWorker(x[0]);if(w===1)w1++;else if(w===2)w2++;else if(w===3)w3++;else td++;}});
  document.getElementById('shc').textContent='미할당 '+td+' | '+workerNames['1']+' '+w1+' | '+workerNames['2']+' '+w2+' | '+workerNames['3']+' '+w3+' | 완료 '+dn;
  var h='';
  for(var i=0;i<Math.min(d.length,500);i++){
    var nm=d[i][0],dn2=isDone(nm),ww=getWorker(nm);
    var cls=dn2?'ld2':ww===1?'lw1':ww===2?'lw2':ww===3?'lw3':'lt';
    var tag=dn2?'✅':ww===1?'🔵':ww===2?'🟠':ww===3?'🟣':'';
    h+='<div class="li" onclick="flyTo('+d[i][1]+','+d[i][2]+',\''+nm.replace(/'/g,"\\'")+'\')"><div class="lnum '+cls+'">'+nm+'</div><div style="flex:1"><div class="lcoord">'+d[i][1].toFixed(5)+'</div><div class="lcoord">'+d[i][2].toFixed(5)+'</div></div>'+(tag?'<span style="font-size:12px;margin-left:auto">'+tag+'</span>':'')+'</div>';
  }
  if(d.length>500)h+='<div style="padding:12px;text-align:center;font-size:11px;color:#ccc">검색으로 더 찾아보세요 ('+d.length+'개)</div>';
  document.getElementById('shl').innerHTML=h;
}
function flyTo(la,ln,nm){
  cPop();closeSh();
  // 최대 확대 (줌 18)
  var nz=18;
  var f=Math.pow(2,nz-Z);
  CX*=f;CY*=f;Z=nz;
  TC={};document.getElementById('tl').innerHTML='';
  // 정확히 중앙으로
  var c=ll2t(la,ln,Z);CX=c.x;CY=c.y;
  draw();
  // 팝업 자동 표시
  setTimeout(function(){
    var d=DALL.find(function(x){return x[0]===nm;});
    if(d){sPop(d,W/2,H/2);}
  },400);
}
function togSh(){shOn?closeSh():openSh();}
function openSh(){shOn=true;document.getElementById('sh').classList.add('on');}
function closeSh(){shOn=false;document.getElementById('sh').classList.remove('on');}
var sx2=0;
document.getElementById('sh').addEventListener('touchstart',function(e){sx2=e.touches[0].clientX;},{passive:true});
document.getElementById('sh').addEventListener('touchend',function(e){if(e.changedTouches[0].clientX-sx2>60)closeSh();},{passive:true});
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  var lc=document.getElementById('lineCanvas');
  if(lc){lc.width=W;lc.height=H;}
  resizeCanvas();draw();
});
updateWorkerNames();
updateWorkerNames();draw();buildList(DALL);
fbLoad(); // 즉시 Firebase 연결

// ── REST API 폴링 (백업) ─────────────────────────────────────
// Firebase SDK WebSocket이 막혀도 3초마다 REST로 동기화
var lastPollData = '';
function pollStatus(){
  var url='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/status.json';
  fetch(url,{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||typeof data!=='object')return;
      var str=JSON.stringify(data);
      if(str===lastPollData)return; // 변경 없으면 무시
      lastPollData=str;
      fbState=data;
      Object.keys(data).forEach(function(nm){
        localState[nm]=Object.assign(localState[nm]||{},data[nm]);
      });
      drawMarkers();updateStats();buildList(getFltList());
      console.log('REST 폴링 갱신');
    })
    .catch(function(e){console.log('폴링 오류:',e);});
}
// 3초마다 폴링 (Firebase SDK on()과 병행)
setInterval(pollStatus, 3000);
// 첫 로딩 즉시 1회 실행
setTimeout(pollStatus, 1000);

// Firebase에서 DXF 라인 로딩
fetch('https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/dxfLines.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data&&Array.isArray(data)&&data.length>0){
      DLINES=data;
      var btn=document.getElementById('dxfBtn');
      if(btn)btn.style.display='';
      // DALL이 없으면 DXF 중심으로 이동
      if(DALL.length===0){
        var sla=0,sln=0,cnt=0;
        data.forEach(function(l){l.pts.forEach(function(p){sla+=p[0];sln+=p[1];cnt++;});});
        if(cnt>0){
          Z=15;
          var c=ll2t(sla/cnt,sln/cnt,Z);CX=c.x;CY=c.y;
          TC={};document.getElementById('tl').innerHTML='';
          draw();
        }
      }
      drawLines();
      console.log('DXF 라인 로딩: '+data.length+'개');
    }
  }).catch(function(){});
