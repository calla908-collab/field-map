<script>
var db=null,fbState={},PROJ_ID='p06403384';
// 담당자 이름 초기값 (localStorage)
var WNAMES_KEY='fm_wnames_'+PROJ_ID;
var workerNames=JSON.parse(localStorage.getItem(WNAMES_KEY)||'{"1":"담당자1","2":"담당자2","3":"담당자3"}');

// 페이지 로드 즉시 Firebase REST API로 이름 불러오기 (SDK 불필요)
(function(){
  var url='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/workerNames.json';
  fetch(url).then(function(r){return r.json();}).then(function(raw){
    if(!raw)return;
    var names;
    if(Array.isArray(raw)){
      // Firebase가 숫자키를 배열로 변환한 경우
      names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
    }else if(typeof raw==='object'){
      names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
    }
    if(names){
      workerNames=names;
      localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
      updateWorkerNames();
    }
  }).catch(function(e){console.log('이름 로딩 실패:',e);});
})();


function fbLoad(){
  // Firebase SDK를 순서대로 로딩
  function loadScript(url,cb){
    var s=document.createElement('script');
    s.src=url;s.async=true;
    s.onload=cb;s.onerror=function(){console.warn('SDK 로드 실패:',url);cb();};
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js',function(){
    loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js',function(){
      if(typeof firebase==='undefined'){console.warn('Firebase 없음');return;}
      try{
        if(!firebase.apps.length)firebase.initializeApp({"apiKey": "AIzaSyDCZils_rrPT3A5c163FM4Ij8ZXQBvPuqE", "databaseURL": "https://landsurvey2027-default-rtdb.firebaseio.com", "projectId": "landsurvey2027"});
        db=firebase.database();

        console.log('Firebase 연결됨');
        document.getElementById('fbDot').textContent='🟢';
        document.getElementById('fbDot').title='Firebase 실시간 연결됨';
        // ★ 라인 상태 실시간 리스너
        db.ref('projects/'+PROJ_ID+'/lineStatus').on('value',function(snap){
          lineStatus=snap.val()||{};
          _lastLineStatus=JSON.stringify(lineStatus);
          drawLines();
          var sm=document.getElementById('statsMod');
          if(sm&&sm.style.display!=='none')showLayerStats();
          console.log('라인상태 실시간 업데이트');
        });
        // ★ 상태 실시간 리스너 (완료/담당자 변경 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/status').on('value',function(snap){
          fbState=snap.val()||{};
          // 삭제된 포인트 처리
          Object.keys(fbState).forEach(function(nm){
            if(fbState[nm]&&fbState[nm].deleted){
              var idx=DALL.findIndex(function(d){return d[0]===nm;});
              if(idx>=0)DALL.splice(idx,1);
            }
            localState[nm]=Object.assign(localState[nm]||{},fbState[nm]);
          });
          drawMarkers();updateStats();buildList(getFltList());
        });
        // 담당자명 실시간 감지 (PC에서 바꾸면 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/workerNames').on('value',function(snap){
          var raw=snap.val();
          if(!raw)return;
          var names;
          if(Array.isArray(raw)){
            names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
          }else{
            names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
          }
          workerNames=names;
          localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
          updateWorkerNames();
          buildList(getFltList());
        });
      }catch(e){console.warn('Firebase 오류:',e);}
    });
  });
}
</script>

<script>
var DALL=[];
var DLINES=[];  // DXF 라인 데이터 [[{layer,pts:[[la,ln],...]}],...]
var showLines=true;
var hiddenLayers={}; // 지도 표시/숨김
var hiddenFromStats={}; // 통계에서만 제외
function isLayerVisible(layer){return !hiddenLayers[layer];}
var selLine=-1; // 선택된 라인 인덱스
var lineStatus={}; // {line_0:{done:true}, line_1:{done:false}}
var _lastLineStatus='';

// 라인 ID
function lineId(idx){return 'line_'+idx;}
// 라인 완료 여부
function lineDone(idx){var s=lineStatus[lineId(idx)];return s&&s.done;}

// 하버사인 공식으로 두 점 거리(m)
function haversine(la1,ln1,la2,ln2){
  var R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// 라인 전체 연장
function lineLength(pts){
  var total=0;
  for(var i=0;i<pts.length-1;i++) total+=haversine(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
  return total;
}
function fmtLen(m){
  return m>=1000?(m/1000).toFixed(3)+'km':Math.round(m)+'m';
}
var selLineData=null; // 선택된 라인 데이터

// 점-선분 거리
function distToSeg(px,py,ax,ay,bx,by){
  var dx=bx-ax,dy=by-ay,t=((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy||1);
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

// 클릭 위치에서 가장 가까운 라인 찾기
function findNearestLine(sx,sy){
  if(!DLINES||!DLINES.length||!showLines)return null;
  var bestIdx=-1,bestDist=30; // 30px 이내
  for(var li=0;li<DLINES.length;li++){
    var item=DLINES[li];
    var tp=item.tp||item.type||'line';
    if(!isLayerVisible(item.layer))return; // 숨긴 레이어 건너뜀
    if(tp==='text')continue;
    var pts=item.pts;
    if(!pts||pts.length<2)continue;
    for(var i=0;i<pts.length-1;i++){
      var t1=ll2t(pts[i][0],pts[i][1],Z);
      var t2=ll2t(pts[i+1][0],pts[i+1][1],Z);
      var ax=(t1.x-CX)*256+W/2,ay=(t1.y-CY)*256+H/2;
      var bx=(t2.x-CX)*256+W/2,by=(t2.y-CY)*256+H/2;
      var d=distToSeg(sx,sy,ax,ay,bx,by);
      if(d<bestDist){bestDist=d;bestIdx=li;}
    }
  }
  return bestIdx>=0?{idx:bestIdx,item:DLINES[bestIdx]}:null;
}

// 라인 중심으로 이동
// 주소 복사
function copyAddr(){
  var txt=document.getElementById('addrText').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(txt);}
  else{var el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
  var btn=event.target;btn.textContent='✅ 복사됨';setTimeout(function(){btn.textContent='📋 주소복사';},1500);
}

// 지도 클릭 → 주소 조회
function showAddrAt(la,ln,sx,sy){
  var pop=document.getElementById('addrPop');
  document.getElementById('addrCoord').textContent=la.toFixed(6)+'  /  '+ln.toFixed(6);
  document.getElementById('addrText').textContent='주소 조회 중...';
  document.getElementById('addrKakao').href='https://map.kakao.com/link/map/위치,'+la+','+ln;
  pop.style.left=Math.min(sx+12,W-310)+'px';
  pop.style.top=Math.max(Math.min(sy-60,H-180),58)+'px';
  pop.style.display='block';
  // Nominatim 역지오코딩
  var k=la.toFixed(5)+','+ln.toFixed(5);
  if(addrCache[k]){
    document.getElementById('addrText').textContent=addrCache[k];
    return;
  }
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+ln+'&format=json&accept-language=ko&zoom=18')
    .then(function(r){return r.json();})
    .then(function(d){
      var addr='주소를 찾을 수 없어요';
      if(d&&d.address){
        var a=d.address,p=[];
        if(a.province||a.state)p.push(a.province||a.state);
        if(a.city||a.county||a.town)p.push(a.city||a.county||a.town);
        if(a.suburb||a.quarter||a.neighbourhood||a.village)p.push(a.suburb||a.quarter||a.neighbourhood||a.village);
        if(a.road)p.push(a.road);
        if(a.house_number)p.push(a.house_number);
        addr=p.length?p.join(' '):(d.display_name||'주소 없음');
      }
      addrCache[k]=addr;
      var el=document.getElementById('addrText');
      if(el)el.textContent=addr;
    }).catch(function(){
      var el=document.getElementById('addrText');
      if(el)el.textContent='주소 조회 실패';
    });
}

function flyToLine(){
  if(!selLineData)return;
  document.getElementById('linePop').style.display='none';
  var pts=selLineData.pts;
  var sla=0,sln=0;
  pts.forEach(function(p){sla+=p[0];sln+=p[1];});
  var la=sla/pts.length,ln=sln/pts.length;
  if(Z<15){var nz=16,f=Math.pow(2,nz-Z);CX*=f;CY*=f;Z=nz;TC={};document.getElementById('tl').innerHTML='';}
  var c=ll2t(la,ln,Z);CX=c.x;CY=c.y;draw();
}

// 라인 팝업 표시
function showLinePop(item,sx,sy,lineIdx){
  selLineData=item;
  // lineIdx를 직접 받거나 DLINES에서 찾기
  var idx4=(lineIdx!==undefined)?lineIdx:DLINES.indexOf(item);
  var layer=item.layer||'(레이어 없음)';
  var pts=item.pts||[];
  var len=lineLength(pts);
  var done=lineDone(idx4);
  var lenStr=len>0?fmtLen(len):'계산 중...';
  document.getElementById('lpLayer').textContent='📐 레이어: '+layer;
  document.getElementById('lpLen').textContent='연장: '+lenStr;
  
  document.getElementById('lpDoneBtn').style.display=done?'none':'block';
  document.getElementById('lpUndoBtn').style.display=done?'block':'none';
  document.getElementById('linePop').style.borderLeftColor=done?'#2dc653':'#3b82f6';
  var pop=document.getElementById('linePop');
  pop.style.left=Math.min(sx+10,W-240)+'px';
  pop.style.top=Math.max(Math.min(sy-100,H-200),58)+'px';
  pop.style.display='block';
}

// 라인 완료 토글
function toggleLineDone(){
  if(!selLineData)return;
  var idx5=selLine>=0?selLine:DLINES.indexOf(selLineData);
  var id=lineId(idx5);
  var done=!lineDone(idx5);
  lineStatus[id]={done:done,doneAt:done?Date.now():null};
  // Firebase 저장
  var url='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/lineStatus/'+id+'.json';
  
  if(db){
    db.ref('projects/'+PROJ_ID+'/lineStatus/'+id).update({done:done,doneAt:done?Date.now():null});
  } else {
    fetch(url,{method:'PATCH',body:JSON.stringify({done:done})});
  }
  document.getElementById('lpDoneBtn').style.display=done?'none':'block';
  document.getElementById('lpUndoBtn').style.display=done?'block':'none';
  document.getElementById('linePop').style.borderLeftColor=done?'#2dc653':'#3b82f6';
  drawLines();
}

// DXF 라인 그리기
function drawLines(){
  var cv=document.getElementById('lineCanvas');
  if(!cv)return;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!showLines||!DLINES||!DLINES.length)return;
  var layerColors={'ZD001':'#FF4400','새한항업':'#0088FF','TZD001':'#FF8800','0':'#3366FF'};
  DLINES.forEach(function(item){
    var idx3=DLINES.indexOf(item);
    var isDone3=lineDone(idx3);
    var color=isDone3?'#2dc653':(layerColors[item.layer]||'#FF6600');
    if(item.tp==='text'||item.type==='text'){
      // 텍스트 표시
      if(!item.pts||!item.pts[0])return;
      var t=ll2t(item.pts[0][0],item.pts[0][1],Z);
      var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
      if(sx<-200||sx>W+200||sy<-200||sy>H+200)return;
      var fontSize=Math.max(10,Math.min(18,Z-4));
      ctx.font='bold '+fontSize+'px Arial';
      ctx.fillStyle=color;
      ctx.globalAlpha=0.9;
      ctx.strokeStyle='rgba(255,255,255,0.8)';
      ctx.lineWidth=3;
      ctx.strokeText(item.text||'',sx,sy);
      ctx.fillText(item.text||'',sx,sy);
    } else {
      // 라인 표시
      var pts=item.pts;
      if(!pts||pts.length<2)return;
      var li2=DLINES.indexOf(item);
      var done2=lineDone(li2);
      ctx.beginPath();
      ctx.strokeStyle=done2?'#2dc653':color;
      ctx.lineWidth=(done2?2:1)*(Z>=16?2.5:Z>=14?2:1.5);
      ctx.globalAlpha=0.9;
      var first=true;
      pts.forEach(function(pt){
        var t=ll2t(pt[0],pt[1],Z);
        var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
        if(first){ctx.moveTo(sx,sy);first=false;}
        else ctx.lineTo(sx,sy);
      });
      ctx.stroke();
      // 선택된 라인 강조 (인덱스로 비교)
      if(selLine>=0&&DLINES[selLine]===item){
        ctx.strokeStyle='#FFD700';
        ctx.lineWidth=(Z>=16?4:3);
        ctx.globalAlpha=0.95;
        ctx.beginPath();
        var first2=true;
        pts.forEach(function(pt){
          var t=ll2t(pt[0],pt[1],Z);
          var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
          if(first2){ctx.moveTo(sx,sy);first2=false;}
          else ctx.lineTo(sx,sy);
        });
        ctx.stroke();
      }
    }
  });
  ctx.globalAlpha=1.0;
}
var W=window.innerWidth,H=window.innerHeight;
var Z=17,CX=0,CY=0,shOn=false,TC={};
var mapType='map'; // 'map' | 'satellite' | 'hybrid'

function getTileUrl(tx,ty,z,ntx){
  if(mapType==='map'){
    return 'https://map'+(Math.abs(tx+ty)%3+1)+'.daumcdn.net/map_2d_png/1906/L'+z+'/'+ty+'/'+ntx+'.png';
  } else if(mapType==='satellite'){
    return 'https://mt'+(Math.abs(tx+ty)%4)+'.google.com/vt/lyrs=s&x='+ntx+'&y='+ty+'&z='+z;
  } else { // hybrid
    return 'https://mt'+(Math.abs(tx+ty)%4)+'.google.com/vt/lyrs=y&x='+ntx+'&y='+ty+'&z='+z;
  }
}

// 레이어별 통계 계산
function calcLayerStats(layerName){
  var lines=DLINES.filter(function(item){
    var tp=item.tp||item.type||'line';
    if(tp==='text')return false;
    if(layerName==='ALL' && (hiddenLayers[item.layer]||hiddenFromStats[item.layer]))return false; // 지도/통계 숨김 레이어 제외
    if(layerName!=='ALL' && item.layer!==layerName)return false;
    return true;
  });
  var total=0,done=0,doneLen=0;
  lines.forEach(function(item){
    var realIdx=DLINES.indexOf(item);
    var len=lineLength(item.pts||[]);
    total+=len;
    if(lineDone(realIdx)){done++;doneLen+=len;}
  });
  return{count:lines.length,total:total,done:done,doneLen:doneLen,
         pct:total>0?Math.round(doneLen/total*100):0};
}

// 포인트 통계 (DXF 없는 사업용)
function calcPointStats(){
  var total=DALL.length,done=0;
  DALL.forEach(function(d){if(isDone(d[0]))done++;});
  return{total:total,done:done,pct:total>0?Math.round(done/total*100):0};
}

function showLayerStats(){
  var hasDXF=DLINES&&DLINES.length>0;
  var hasPts=DALL&&DALL.length>0;
  if(!hasDXF&&!hasPts){alert('통계 데이터가 없어요.');return;}

  // DXF 없고 포인트만 있는 경우 - 포인트 통계
  if(!hasDXF&&hasPts){
    var ps=calcPointStats();
    document.getElementById('statsTotal').textContent='총 '+ps.total+'개 포인트';
    document.getElementById('layerTabs').innerHTML='';
    document.getElementById('statsBar').innerHTML=
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">'+
      '<div style="background:#f0f9ff;border-radius:10px;padding:12px;text-align:center">'+
        '<div style="font-size:24px;font-weight:800;color:#1a1a2e">'+ps.total+'</div>'+
        '<div style="font-size:11px;color:#888;margin-top:4px">전체 포인트</div></div>'+
      '<div style="background:#f0fff4;border-radius:10px;padding:12px;text-align:center">'+
        '<div style="font-size:24px;font-weight:800;color:#2dc653">'+ps.done+'</div>'+
        '<div style="font-size:11px;color:#888;margin-top:4px">완료</div></div>'+
      '<div style="background:#fffbeb;border-radius:10px;padding:12px;text-align:center">'+
        '<div style="font-size:24px;font-weight:800;color:#f97316">'+(ps.total-ps.done)+'</div>'+
        '<div style="font-size:11px;color:#888;margin-top:4px">미완료</div></div>'+
      '</div>'+
      '<div style="margin-bottom:6px;display:flex;justify-content:space-between">'+
        '<span style="font-size:12px;font-weight:700">진행률</span>'+
        '<span style="font-size:14px;font-weight:800;color:#3b82f6">'+ps.pct+'%</span></div>'+
      '<div style="background:#f0f0f0;border-radius:10px;height:16px;overflow:hidden">'+
        '<div style="height:100%;background:linear-gradient(90deg,#2dc653,#60d394);width:'+ps.pct+'%;border-radius:10px"></div></div>';
    // 담당자별 통계 추가
    var w1c=0,w2c=0,w3c=0,wtd=0;
    DALL.forEach(function(d){
      if(isDone(d[0]))return;
      var w=getWorker(d[0]);
      if(w===1)w1c++;else if(w===2)w2c++;else if(w===3)w3c++;else wtd++;
    });
    document.getElementById('statsBar').innerHTML+=
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px">'+
        '<div style="background:#eff6ff;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:20px;font-weight:800;color:#3b82f6">'+w1c+'</div>'+
          '<div style="font-size:10px;color:#3b82f6">'+workerNames["1"]+'</div></div>'+
        '<div style="background:#fff7ed;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:20px;font-weight:800;color:#f97316">'+w2c+'</div>'+
          '<div style="font-size:10px;color:#f97316">'+workerNames["2"]+'</div></div>'+
        '<div style="background:#faf5ff;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:20px;font-weight:800;color:#a855f7">'+w3c+'</div>'+
          '<div style="font-size:10px;color:#a855f7">'+workerNames["3"]+'</div></div>'+
        '<div style="background:#f0f0f0;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:20px;font-weight:800;color:#888">'+wtd+'</div>'+
          '<div style="font-size:10px;color:#888">미할당</div></div>'+
      '</div>';
    document.getElementById('statsList').innerHTML='';
    document.getElementById('statsMod').style.display='flex';
    return;
  }

  // DXF 라인 통계
  // → 항상 포인트 통계도 포함 (아래 renderStats에서 처리)
  // 레이어 목록 추출
  var layers=[];
  DLINES.forEach(function(item){
    var tp=item.tp||item.type||'line';

function flyToLineIdx(idx){
  if(idx<0||idx>=DLINES.length)return;

  var pts=item.pts||[];
  if(!pts.length)return;
  var sla=0,sln=0;
  pts.forEach(function(p){sla+=p[0];sln+=p[1];});
  // 최대 줌(18)으로
  var nz=18,f=Math.pow(2,nz-Z);
  CX*=f;CY*=f;Z=nz;TC={};document.getElementById('tl').innerHTML='';
  var c=ll2t(sla/pts.length,sln/pts.length,Z);CX=c.x;CY=c.y;
  selLine=idx;selLineData=item;
  draw();
  document.getElementById('statsMod').style.display='none';
}

// 좌표변환
function ll2t(la,ln,z){var n=Math.pow(2,z);return{x:(ln+180)/360*n,y:(1-Math.log(Math.tan(la*R)+1/Math.cos(la*R))/Math.PI)/2*n};}
function t2ll(tx,ty,z){var n=Math.pow(2,z),ln=tx/n*360-180;return{la:Math.atan(Math.sinh(Math.PI*(1-2*ty/n)))/R,ln:ln};}
// 초기 중심: 포인트 우선, 없으면 DXF 라인 중심
(function(){
  if(DALL.length>0){
    var first=DALL[0];
    var c=ll2t(first[1],first[2],Z);
    CX=c.x;CY=c.y;
    setTimeout(function(){
      if(DALL.length>0){
        var d=DALL[0];
        var t=ll2t(d[1],d[2],Z);
        sPop(d,(t.x-CX)*256+W/2,(t.y-CY)*256+H/2);
      }
    },800);
  }
  // DALL 없고 DXF 라인 있으면 라인 중심으로
  else if(DLINES&&DLINES.length>0){
    var sla=0,sln=0,cnt=0;
    DLINES.forEach(function(l){
      l.pts.forEach(function(p){sla+=p[0];sln+=p[1];cnt++;});
    });
    if(cnt>0){var c=ll2t(sla/cnt,sln/cnt,Z);CX=c.x;CY=c.y;}
  }
})();
function p2s(tx,ty){return{x:(tx-CX)*256+W/2,y:(ty-CY)*256+H/2};}
function s2t(sx,sy){return{x:sx/256+CX-W/512,y:sy/256+CY-H/512};}

// 타일
function drawTiles(){
  var td=document.getElementById('tl'),n=Math.pow(2,Z);
  var x0=Math.floor(CX-W/512)-1,y0=Math.floor(CY-H/512)-1,x1=Math.ceil(CX+W/512)+1,y1=Math.ceil(CY+H/512)+1;
  td.querySelectorAll('.tile').forEach(function(t){
    if(+t.dataset.z!==Z){t.style.display='none';return;}
    t.style.display='block';var p=p2s(+t.dataset.x,+t.dataset.y);t.style.left=p.x+'px';t.style.top=p.y+'px';
  });
  for(var tx=x0;tx<=x1;tx++){for(var ty=y0;ty<=y1;ty++){
    if(ty<0||ty>=n)continue;
    var ntx=((tx%n)+n)%n,k=Z+','+tx+','+ty;
    if(TC[k])continue;TC[k]=1;
    var img=new Image();img.className='tile';img.dataset.x=tx;img.dataset.y=ty;img.dataset.z=Z;img.dataset.ntx=ntx;img.dataset.ty2=ty;img.dataset.tz=Z;
    img.onerror=function(){if(this.dataset.tried)return;this.dataset.tried=1;this.src='https://a.tile.openstreetmap.org/'+this.dataset.tz+'/'+this.dataset.ntx+'/'+this.dataset.ty2+'.png';};
    img.src=getTileUrl(tx,ty,Z,ntx);
    var p=p2s(tx,ty);img.style.cssText='position:absolute;width:256px;height:256px;left:'+p.x+'px;top:'+p.y+'px';
    td.appendChild(img);
  }}
}

// 클러스터
function cluster(pts){
  var cell=44,g={};
  pts.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),x=(t.x-CX)*256+W/2,y=(t.y-CY)*256+H/2;
    if(x<-80||x>W+80||y<-80||y>H+80)return;
    if(selMode){g[d[0]]={p:[d],la:d[1],ln:d[2],x:x,y:y};return;}
    var k=Math.floor(x/cell)+','+Math.floor(y/cell);
    if(!g[k])g[k]={p:[],la:0,ln:0,x:0,y:0};
    g[k].p.push(d);g[k].la+=d[1];g[k].ln+=d[2];g[k].x+=x;g[k].y+=y;
  });
  return Object.keys(g).map(function(k){var c=g[k],n=c.p.length;return{pts:c.p,la:n>1?c.la/n:c.la,ln:n>1?c.ln/n:c.ln,x:n>1?c.x/n:c.x,y:n>1?c.y/n:c.y};});
}

function getDotCls(nm){
  if(selSet.has(nm))return'dot dsel';
  if(isDone(nm))return'dot dd';
  var w=getWorker(nm);if(w===1)return'dot dw1';if(w===2)return'dot dw2';if(w===3)return'dot dw3';return'dot dt';
}

// 박스 선택 (PC)
var boxStart=null,boxEnd=null;
function updateBoxRect(){
  if(!boxStart||!boxEnd)return;
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  var r=document.getElementById('boxRect');
  r.style.cssText='display:block;left:'+x1+'px;top:'+y1+'px;width:'+(x2-x1)+'px;height:'+(y2-y1)+'px';
}
function finishBox(){
  if(!boxStart||!boxEnd){boxStart=null;return;}
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  document.getElementById('boxRect').style.display='none';
  if(x2-x1<5&&y2-y1<5){boxStart=null;return;}
  // 박스 → 위경도 변환
  var tl1=s2t(x1,y1),tl2=s2t(x2,y2);
  var ll1=t2ll(tl1.x,tl1.y,Z),ll2=t2ll(tl2.x,tl2.y,Z);
  var mla=Math.min(ll1.la,ll2.la),xla=Math.max(ll1.la,ll2.la);
  var mln=Math.min(ll1.ln,ll2.ln),xln=Math.max(ll1.ln,ll2.ln);
  selSet=new Set();
  DALL.forEach(function(d){if(d[1]>=mla&&d[1]<=xla&&d[2]>=mln&&d[2]<=xln)selSet.add(d[0]);});
  boxStart=null;
  updateSelPanel();drawMarkers();
}

// 라쏘 선택 (모바일)
function drawLasso(){
  lassoCtx.clearRect(0,0,W,H);
  if(lassoPath.length<2)return;
  lassoCtx.beginPath();
  lassoCtx.moveTo(lassoPath[0].x,lassoPath[0].y);
  for(var i=1;i<lassoPath.length;i++)lassoCtx.lineTo(lassoPath[i].x,lassoPath[i].y);
  lassoCtx.closePath();
  lassoCtx.fillStyle='rgba(168,85,247,.12)';lassoCtx.fill();
  lassoCtx.strokeStyle='#a855f7';lassoCtx.lineWidth=2;lassoCtx.setLineDash([6,3]);lassoCtx.stroke();
}
function pointInPoly(px,py,poly){
  var inside=false;
  for(var i=0,j=poly.length-1;i<poly.length;j=i++){
    var xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }return inside;
}
function finishLasso(){
  if(lassoPath.length<3){lassoPath=[];lassoCtx.clearRect(0,0,W,H);return;}
  selSet=new Set();
  DALL.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),px=(t.x-CX)*256+W/2,py=(t.y-CY)*256+H/2;
    if(pointInPoly(px,py,lassoPath))selSet.add(d[0]);
  });
  lassoPath=[];lassoCtx.clearRect(0,0,W,H);
  updateSelPanel();drawMarkers();
}

      if(s===_lastPollData)return;
      _lastPollData=s;
      fbState=d;
      Object.keys(d).forEach(function(nm){localState[nm]=Object.assign(localState[nm]||{},d[nm]);});
      drawMarkers();updateStats();buildList(getFltList());
    }).catch(function(){});
  // 라인 상태
  fetch(FB+'/projects/'+PROJ_ID+'/lineStatus.json',{cache:'no-store'})
    .then(function(r){return r.json();}).then(function(d){

      lineStatus=d;
      drawLines();
      var sm=document.getElementById('statsMod');
      if(sm&&sm.style.display!=='none')showLayerStats();
    }).catch(function(){});
}
